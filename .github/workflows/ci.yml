# =============================================================
# Lumora CI/CD Pipeline -> GitHub Container Registry (ghcr.io)
# =============================================================
# This file lives at .github/workflows/ci.yml
# GitHub auto-detects it and runs it on the triggers below.
#
# Why ghcr.io and not Docker Hub?
#   - You already have GitHub. No new account.
#   - Free for public images, generous limits for private.
#   - GitHub auto-provides a token (GITHUB_TOKEN) that can push
#     to ghcr.io. NO manual secrets to set up.
# =============================================================

name: Lumora CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # adds a manual "Run workflow" button

# ---------- Permissions ----------
# By default GITHUB_TOKEN can only READ. We need WRITE for ghcr.io.
permissions:
  contents: read
  packages: write

# ---------- Environment vars used in this workflow ----------
env:
  REGISTRY: ghcr.io
  # ${{ github.repository_owner }} = your GitHub username, lowercase
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:

  # ============================================================
  # JOB 1: Run tests on the API (the "CI" part)
  # ============================================================
  test:
    name: Run API tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: ./api
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: ./api
        run: pytest -v

  # ============================================================
  # JOB 2: Build and push images to ghcr.io (the "CD" part)
  # ============================================================
  # Only runs on pushes to main (not PRs).
  # Only runs if tests passed (needs: test).
  # ============================================================
  build-and-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        # github.actor is the username triggering the workflow.
        # secrets.GITHUB_TOKEN is auto-provided by GitHub - you don't set it.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-api:${{ github.sha }}
          # Two tags per image:
          #   :latest        -> always the newest
          #   :<commit sha>  -> immutable, lets us roll back to a specific build

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-web:${{ github.sha }}

      - name: Summary
        run: |
          echo "✅ Images pushed:"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-api:latest"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-web:latest"
          echo ""
          echo "To pull locally:"
          echo "   docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/lumora-api:latest"
