# =============================================================
# Custom nginx config for Lumora web container
# =============================================================
# Replaces nginx's default behavior with one extra rule:
#   - Anything starting with /api/  ->  proxied to the API
#   - Everything else                ->  static files (our HTML)
#
# In Kubernetes, "lumora-api" resolves to the API Service's
# internal cluster IP automatically (K8s DNS magic).
# This file gets copied into the image at build time.
# =============================================================

server {
    listen 80;
    server_name _;

    # Static files - serve from where COPY put them
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the API service
    # Example: GET /api/profiles -> GET http://lumora-api:8000/profiles
    location /api/ {
        # Trailing slash on both sides strips /api/ from the path:
        #   /api/profiles -> /profiles on the API
        proxy_pass http://lumora-api:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: serve static files normally
    location / {
        try_files $uri $uri/ =404;
    }
}
